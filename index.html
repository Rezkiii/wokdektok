<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>USD to IDR</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #202124;
  color: #e8eaed;
  font-family: 'Inter', sans-serif;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 15px 30px;
}
.logo { font-size: 22px; font-weight: 500; margin-right: 20px; }
.search {
  flex: 1;
  background: #303134;
  border-radius: 30px;
  padding: 10px 20px;
  color: #bdc1c6;
}

/* NAV */
.nav {
  display: flex;
  gap: 20px;
  padding: 0 30px;
  border-bottom: 1px solid #3c4043;
}
.nav span {
  padding: 10px 0;
  color: #9aa0a6;
}
.nav .active {
  color: #e8eaed;
  border-bottom: 2px solid #8ab4f8;
}

/* MAIN */
.container {
  display: flex;
  padding: 40px;
  gap: 40px;
}

.left { width: 50%; }
.right { width: 50%; }

.title { font-size: 14px; color: #9aa0a6; }
.big {
  font-size: 48px;
  font-weight: 400;
  letter-spacing: -0.5px;
  margin: 10px 0;
}
.subtext {
  font-size: 12px;
  color: #9aa0a6;
  margin-bottom: 10px;
}

/* INPUT */
.input-group {
  display: flex;
  border: 1px solid #5f6368;
  border-radius: 12px;
  overflow: hidden;
}
.input-group input {
  flex: 1;
  padding: 12px;
  background: transparent;
  border: none;
  color: white;
}

/* RANGE */
.range {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
.range span {
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 13px;
  color: #9aa0a6;
}
.range .active {
  background: #303134;
  color: #8ab4f8;
}

canvas { max-height: 180px; }

/* ===== CAPTCHA REALISTIC ===== */
#captcha {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(32,33,36,0.95);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.captcha-wrapper {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 320px;
  padding: 15px;
  background: white;
  border-radius: 6px;
  color: black;
  font-family: Arial;
}

.captcha-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.checkbox {
  width: 24px;
  height: 24px;
  border: 2px solid #c1c1c1;
  border-radius: 3px;
  cursor: pointer;
  position: relative;
}

/* loading */
.checkbox.loading::after {
  content: "";
  width: 16px;
  height: 16px;
  border: 2px solid #ccc;
  border-top: 2px solid #4285f4;
  border-radius: 50%;
  position: absolute;
  top: 2px;
  left: 2px;
  animation: spin 1s linear infinite;
}

/* checked */
.checkbox.checked {
  background: #4285f4;
  border-color: #4285f4;
}

.checkbox.checked::after {
  content: "✔";
  color: white;
  font-size: 16px;
  position: absolute;
  top: 0;
  left: 4px;
}

.captcha-right {
  text-align: center;
  font-size: 10px;
  color: #555;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Google</div>
  <div class="search">usd to idr</div>
</div>

<div class="nav">
  <span class="active">Semua</span>
  <span>Keuangan</span>
  <span>Berita</span>
</div>

<div class="container">
  <div class="left">
    <div class="title">1 Dolar Amerika Serikat sama dengan</div>
    <div class="big" id="result">17.705,00 Rupiah Indonesia</div>
    <div class="subtext">20 Mei · Data simulasi</div>

    <div class="input-group">
      <input type="number" id="usd" value="1">
      <input type="text" id="idr" readonly>
    </div>
  </div>

  <div class="right">
    <div class="range">
      <span>1HR</span>
      <span>5HR</span>
      <span class="active">1BLN</span>
      <span>1TH</span>
    </div>
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- CAPTCHA -->
<div id="captcha">
  <div class="captcha-wrapper">
    <div class="captcha-left">
      <div class="checkbox" id="box"></div>
      <span id="label">Saya bukan robot</span>
    </div>
    <div class="captcha-right">
      <div><b>reCAPTCHA</b></div>
      <div>Privasi - Persyaratan</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// ===== CURRENCY =====
let rate = 17705;
const usd = document.getElementById("usd");
const idr = document.getElementById("idr");
const result = document.getElementById("result");

function format(num) {
  return num.toLocaleString("id-ID", { minimumFractionDigits: 2 });
}

function update() {
  let val = usd.value || 0;
  let conv = val * rate;
  idr.value = format(conv);
  result.innerText = format(conv) + " Rupiah Indonesia";
}
usd.addEventListener("input", update);
update();

// ===== CHART =====
const ctx = document.getElementById("chart").getContext("2d");

const gradient = ctx.createLinearGradient(0,0,0,200);
gradient.addColorStop(0,"rgba(129,201,149,0.4)");
gradient.addColorStop(1,"rgba(129,201,149,0)");

let dataPoints = new Array(40).fill(17200);

const chart = new Chart(ctx, {
  type: "line",
  data: {
    labels: dataPoints.map((_,i)=>i),
    datasets: [{
      data: dataPoints,
      borderColor: "#81c995",
      backgroundColor: gradient,
      fill: true,
      tension: 0.4,
      pointRadius: (ctx) => ctx.dataIndex === ctx.dataset.data.length-1 ? 4 : 0
    }]
  },
  options: {
    animation: false,
    plugins: { legend: { display:false }},
    scales: {
      x: { display:false },
      y: {
        grid: { color:"#3c4043" },
        ticks: { color:"#9aa0a6" }
      }
    }
  }
});

// ===== AUDIO =====
async function start() {
  const audio = new Audio("lagu.mp3");

  const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
  await ctxAudio.resume();

  const source = ctxAudio.createMediaElementSource(audio);
  const analyser = ctxAudio.createAnalyser();

  source.connect(analyser);
  analyser.connect(ctxAudio.destination);

  analyser.fftSize = 256;
  const dataArray = new Uint8Array(analyser.frequencyBinCount);

  audio.play();

  function animate() {
    requestAnimationFrame(animate);
    analyser.getByteFrequencyData(dataArray);

    let bass = dataArray.slice(0,10).reduce((a,b)=>a+b,0)/10;

    dataPoints.push(17000 + bass*3);
    dataPoints.shift();

    chart.data.datasets[0].data = dataPoints;
    chart.update();
  }

  animate();
}

// ===== CAPTCHA LOGIC =====
const box = document.getElementById("box");
const label = document.getElementById("label");

box.addEventListener("click", () => {

  box.classList.add("loading");
  label.innerText = "Memverifikasi...";

  setTimeout(() => {
    box.classList.remove("loading");
    box.classList.add("checked");
    label.innerText = "Saya bukan robot";

    setTimeout(() => {
      document.getElementById("captcha").style.display = "none";
      start();
    }, 700);

  }, 1500);

});
</script>

</body>
</html>
